# Canada Market Configuration — Phase 1 (screener universe only)
#
# This is intentionally a MINIMAL config. Only the `universe` section is
# populated with verified data (config/tickers/tsx60.txt, a real, dated TSX
# 60 snapshot). Sections present in us.yaml but absent here (macro_symbols,
# sector_etfs, macro_beta, sentiment feeds, etc.) are deliberately NOT
# fabricated — every consumer of this config already defaults missing
# sections safely (e.g. `config.get("macro_symbols", {})`), so leaving them
# out means those subsystems will show an honest DATA-GAP for CA tickers
# rather than silently using wrong US-market values. See the plan this
# file was added under (docs/superpowers/plans/2026-07-15-multi-market-screener-canada.md)
# for what's explicitly out of scope.
market: ca
timezone: America/Toronto

universe:
  source: config_files
  ticker_files:
    - config/tickers/tsx60.txt
  min_market_cap: 1_000_000_000
  min_avg_volume: 100_000
  exclude_penny_stocks: true
  penny_stock_threshold: 5.0
