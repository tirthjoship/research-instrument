# US Market Configuration — Phase 3A
market: us
timezone: America/New_York

trading_hours:
  open: "09:30"
  close: "16:00"

universe:
  source: config_files
  ticker_files:
    - config/tickers/sp500.txt
    - config/tickers/nasdaq100.txt
  min_market_cap: 2_000_000_000
  min_avg_volume: 500_000
  exclude_penny_stocks: true
  penny_stock_threshold: 5.0

macro_symbols:
  vix: "^VIX"
  treasury_10y: "^TNX"
  dxy: "DX-Y.NYB"
  irx: "^IRX"
  spy: "SPY"

sector_etfs:
  Technology: "XLK"
  Healthcare: "XLV"
  Financials: "XLF"
  Consumer Discretionary: "XLY"
  Consumer Staples: "XLP"
  Energy: "XLE"
  Industrials: "XLI"
  Materials: "XLB"
  Utilities: "XLU"
  Real Estate: "XLRE"
  Communication Services: "XLC"

# Macro-beta scrubber (Unit A, ADR-052). Independent of macro_symbols above:
# those are yield/index LEVELS; these are tradeable ETFs whose daily RETURNS are
# the factors. Thresholds are heuristic surfacing dials, NOT validated edges.
macro_beta:
  factors: [SPY, TLT, UUP, XLE]   # market / rates / dollar / energy-equity
  headline_window_days: 252       # ~1 year
  drift_window_days: 63           # ~1 quarter
  # NOTE: ridge_alpha is NOT a literal sklearn alpha. The estimator scales it by
  # mean factor-return variance, so it is a scale-invariant relative shrinkage
  # fraction (0.2 = light shrinkage). Betas remain raw, dollar-interpretable.
  ridge_alpha: 0.2
  systematic_share_threshold: 0.60
  factor_dominance_threshold: 0.25
  drift_threshold: 0.50

features:
  price_outlier_cap: 0.30
  volume_outlier_threshold: 20
  min_trading_days: 20
  max_nan_fraction: 0.50

horizons:
  2d:
    noise_threshold: 0.015
  5d:
    noise_threshold: 0.020
  10d:
    noise_threshold: 0.030

quality_gates:
  min_qualified_tickers: 5
  degraded_threshold: 15
  feature_nan_warn: 0.05
  feature_nan_abort: 0.30
  max_staleness_days: 3

pretraining:
  history_years: 3
  walk_forward_start: "2024-01"

model:
  ensemble_weights: "accuracy"
  retrain_frequency: "monthly"

evaluation:
  permutation_shuffles: 1000
  significance_threshold: 0.05
  transaction_cost_pct: 0.001
  regime_thresholds:
    bull: 0.10
    bear: -0.10

gemini:
  # Minimum seconds between Gemini API calls. Free tier is ~14 rpm (~4.3 s min).
  # Override at runtime with GEMINI_MIN_INTERVAL_S env var (env wins).
  min_interval_seconds: 5.0

sentiment:
  rss_feeds:
    reuters: "https://www.reutersagency.com/feed/?best-topics=business-finance"
    marketwatch: "https://feeds.marketwatch.com/marketwatch/topstories/"
    cnbc: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
    yahoo_finance: "https://finance.yahoo.com/news/rssindex"
    seeking_alpha: "https://seekingalpha.com/market_currents.xml"
    investing_com: "https://www.investing.com/rss/news.rss"
  flan_t5_model: "google/flan-t5-base"
  flan_t5_device: null
  source_reliability:
    min_calls_for_weight: 10
    default_accuracy: 0.5
    window_days: 90
  buzz_discovery:
    min_acceleration_threshold: 2.0
    min_mentions_per_week: 3
  google_trends:
    rate_limit_seconds: 2.0
    enabled: true
  stocktwits:
    rate_limit_seconds: 1.8
    enabled: true
  gdelt:
    rate_limit_seconds: 1.0
    enabled: true
    lookback_days: 7

risk:
  stop_loss_threshold: -0.08
  sentiment_sell_threshold: -0.5

# Conviction scoring weights — tunable per market
conviction:
  weights:
    signal_agreement: 1.0
    smart_money: 1.5
    sentiment_momentum: 1.0
    fundamental_basis: 1.0
    temporal_freshness: 1.2
    ml_direction: 0.3
  top_n: 15
  min_score: 3.0
  scan_schedule:
    full_scan: "06:00"
    filing_check: "12:00"
    post_market: "18:00"

# SEC EDGAR configuration
sec_edgar:
  user_agent: "StockRecommender research@example.com"
  rate_limit_seconds: 1.0

opportunity_engine:
  divergence_blend:
    event_weight: 0.5
    intensity_weight: 0.5
  thresholds:
    # Recalibrated 2026-06-05 on the WARMED-SPINE distribution (19 candidates,
    # data/reports/_warm_distribution.txt; cap_tier now correct: 13 large / 6 mid).
    # Conviction stays compressed (2.49-3.09). The discrimination audit
    # (data/reports/_dim_audit.txt) explains WHY: of 8 conviction dims only
    # temporal_freshness (var=2.65) varies strongly and fundamental_basis (0.25)
    # weakly — the other 6 are DEAD (smart_money/signal_agreement constant;
    # sentiment_momentum/ml_direction/event_signal/analyst_signal 100% neutral).
    # So conviction currently measures data-freshness, not opportunity. cmin at the
    # top-cluster knee (3.0), dmin at the divergence upper-tail knee (6.0). Even on
    # warmed+fixed data NO name clears both axes -> honest abstention. REAL fix is to
    # PRUNE the dead dims and reweight toward the live ones (deferred follow-up,
    # see ADR-042 discrimination audit); recalibrate again after pruning.
    cmin: 3.0
    dmin: 6.0
  signal_cache_ttl_hours: 24
  backfill_days: 90
  sources:
    gdelt: true
    google_trends: true
    google_news: true
    wikipedia: true
    reddit: false   # flips to true once REDDIT_CLIENT_ID/SECRET env vars exist
