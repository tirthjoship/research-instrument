# India Market Configuration — Phase 1 (screener universe only)
#
# This is intentionally a MINIMAL config, mirroring ca.yaml. Only the
# `universe` section is populated, pointing at config/tickers/nifty50.txt
# — read that file's own header before trusting it further: it's a
# snapshot dated 2025-12-08, cross-checked between two secondary sources
# (NSE's own PDF wasn't machine-readable at fetch time), and has three
# tickers with open verification caveats (M&M, BAJAJ-AUTO, TMPV). Sections
# present in us.yaml but absent here (macro_symbols, sector_etfs,
# macro_beta, sentiment feeds, etc.) are deliberately NOT fabricated —
# every consumer of this config already defaults missing sections safely
# (e.g. `config.get("macro_symbols", {})`), so leaving them out means those
# subsystems will show an honest DATA-GAP for India tickers rather than
# silently using wrong US-market values. See the plan this file was added
# under (docs/superpowers/plans/2026-07-15-multi-market-screener-canada.md)
# for what's explicitly out of scope.
market: in
timezone: Asia/Kolkata

universe:
  source: config_files
  ticker_files:
    - config/tickers/nifty50.txt
  min_market_cap: 1_000_000_000
  min_avg_volume: 100_000
  exclude_penny_stocks: true
  penny_stock_threshold: 5.0
