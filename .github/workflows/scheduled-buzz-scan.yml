name: Scheduled buzz scan

# Populates data/recommendations.db's buzz_signals table on a schedule and
# commits it, mirroring scheduled-screen.yml's pattern: runs on a clean
# GH-hosted runner (not Cloud's shared/rate-limited outbound IP) so the
# public dashboard's Buzz panel reads real data instead of a permanent
# zero (data/recommendations.db is .gitignored and starts empty on every
# Cloud deploy, and nothing else ever wrote to it there).
#
# US only — RSS/Trends/News/Reddit (all keyless). India buzz (Marketaux)
# lives in its own scheduled-buzz-scan-in.yml, deliberately split into a
# separate workflow rather than a second step here: running both markets
# sequentially in one job shares a single runner IP/session, and Google
# Trends' per-IP rate limiting is cumulative — confirmed live 2026-07-18
# that the US step (first in line) ran 50/50 tickers clean, then India
# (second, same IP, ~3 min later) immediately started 429ing and lost most
# of its Trends coverage. Splitting into separate workflows gives each a
# fresh runner/IP. See docs/STATUS.md for the full investigation.
on:
  schedule:
    # 22:00 UTC, weekdays only — 30 minutes after scheduled-screen.yml's
    # 21:30 UTC run so the two bot commits never race on the same push.
    - cron: "0 22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: scheduled-buzz-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scheduled-buzz-scan:
    name: Daily buzz scan + commit DB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev --extra dashboard
      - name: Run daily buzz scan (US)
        run: |
          uv run python -m application.cli daily-scan --prune-days 35
      - name: Commit buzz DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recommendations.db
          git diff --cached --quiet || git commit -m "chore(data): scheduled buzz scan (US) $(date -u +%F)"
          git push
