name: Test

on:
  # Feature branches run CI once via their PR (pull_request); pushing to
  # main/develop (merges) runs once via push. Avoids the double-run that
  # firing on both push:feat/** and pull_request caused.
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test Suite (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev --extra dashboard
      - name: Run tests with coverage
        run: uv run pytest tests/ -n auto --tb=short --cov=domain --cov=adapters --cov=application --cov-fail-under=90
