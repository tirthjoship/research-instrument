name: Test

on:
  push:
    branches: [main, develop]
    paths-ignore: ["**.md", "docs/**", "research/**"]
  pull_request:
    branches: [main, develop]
    paths-ignore: ["**.md", "docs/**", "research/**"]

# Cancel superseded runs on the same ref so stacked pushes don't burn minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev --extra dashboard
      - name: Run tests with coverage
        run: uv run pytest tests/ -n auto --tb=short --cov=domain --cov=adapters --cov=application --cov-fail-under=90
