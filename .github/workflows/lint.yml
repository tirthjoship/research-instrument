name: Lint & Typecheck

on:
  push:
    branches: [main, develop, "feature/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pre-commit
          pip install black isort mypy ruff
          pip install "types-PyYAML==6.0.12.20260518" "types-click==7.1.8" "types-requests==2.33.0.20260518" "pandas-stubs==3.0.3.260530" loguru
      - name: Run pre-commit
        run: pre-commit run --all-files

  typecheck:
    name: Typecheck (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install mypy "pandas-stubs==3.0.3.260530" "types-requests==2.33.0.20260518" "types-PyYAML==6.0.12.20260518" "types-click==7.1.8" loguru
          pip install pandas scikit-learn xgboost lightgbm hypothesis numpy
      - name: Run mypy
        run: mypy domain/ adapters/ application/ --strict
