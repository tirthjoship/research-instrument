name: Lint & Typecheck

on:
  push:
    branches: [main, develop, "feature/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  typecheck:
    name: Typecheck (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run mypy
        run: uv run mypy domain/ adapters/ application/ --strict
