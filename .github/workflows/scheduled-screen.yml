name: Scheduled screen snapshot

# Item 5 of the Cloud deploy scaling design
# (docs/superpowers/specs/2026-07-14-cloud-deploy-scaling-and-access-design.md):
# runs the ~512-ticker full-universe screen from a clean GH-hosted runner
# (not Cloud's shared/rate-limited IP) and commits the snapshot the public
# dashboard reads, so a visitor's own click never triggers a live scan.
#
# Also runs Canada (TSX 60, ~52 tickers) and India (NIFTY 50, ~50 tickers)
# into their own data/sample/ca/ and data/sample/in/ subdirectories, so their
# daily screen_<date>.json files never collide with the US run's filename in
# data/sample/. Nothing reads these yet -- the dashboard has no market-picker
# UI wired up -- this just makes the snapshots exist and stay fresh for when
# that UI lands. --use-cache on all three runs dedupes _PriceAdapter's 4
# independent get_signals() calls per ticker into 1 (data/cache/ is
# gitignored and starts empty on every checkout, so this never crosses days).
on:
  schedule:
    # 21:30 UTC, weekdays only — shortly after US market close, well before
    # the next morning's visitor traffic. Markets are closed weekends, so a
    # weekend run would just re-screen stale prices.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: scheduled-screen
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scheduled-screen:
    name: Screen candidates + commit snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev --extra dashboard
      - name: Run full-universe screen (US)
        env:
          # GEMINI_API_KEY_2 (etc.) is picked up automatically by
          # adapters/ml/gemini_models.py::load_gemini_api_keys() once the
          # primary key's daily free-tier quota is exhausted — same
          # multi-key fallback used locally and on Streamlit Cloud. Add one
          # more line here (+ the matching repo secret) for a future _3.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          uv run python -m application.cli screen-candidates \
            --report-dir data/sample --cite-cases --use-cache
      - name: Run Canada screen (TSX 60)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          uv run python -m application.cli screen-candidates \
            --market ca --report-dir data/sample/ca --cite-cases --use-cache
      - name: Run India screen (NIFTY 50)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          uv run python -m application.cli screen-candidates \
            --market in --report-dir data/sample/in --cite-cases --use-cache
      - name: Prune to last 14 daily snapshots
        run: |
          for dir in data/sample data/sample/ca data/sample/in; do
            [ -d "$dir" ] || continue
            (
              cd "$dir"
              ls -1 screen_20*.json 2>/dev/null \
                | grep -v '^screen_ic_' \
                | sort \
                | head -n -14 \
                | xargs -r rm -f
            )
          done
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sample/screen_20*.json data/sample/screen_cited_cases.json
          git add data/sample/ca/screen_20*.json data/sample/ca/screen_cited_cases.json
          git add data/sample/in/screen_20*.json data/sample/in/screen_cited_cases.json
          git diff --cached --quiet || git commit -m "chore(data): scheduled screen snapshot $(date -u +%F)"
          git push
