repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit, pre-push]
      - id: end-of-file-fixer
        stages: [pre-commit, pre-push]
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        stages: [pre-commit, pre-push]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy domain/ adapters/ application/ --strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.15
    hooks:
      - id: ruff

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Local pre-push gate — run the fast suite on YOUR machine before pushing so
  # failures don't burn GitHub Actions minutes upstream. Lint/format/mypy already
  # run at pre-commit; this adds the test pass at pre-push.
  - repo: local
    hooks:
      - id: test-fast
        name: test-fast (pre-push gate)
        entry: make test-fast
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
